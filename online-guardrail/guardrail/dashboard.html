/* ═══════════════════════════════════════════════════════
   Bundled replay events
   ═══════════════════════════════════════════════════════ */
const BUNDLED_EVENTS = {};

let _replayTimer = null;
let _replayUiTimers = [];

function clearReplayTimers() {
  if (_replayTimer) { clearTimeout(_replayTimer); _replayTimer = null; }
  _replayUiTimers.forEach(timer => clearTimeout(timer));
  _replayUiTimers = [];
}

function scheduleReplayUi(fn, delay) {
  const timer = setTimeout(() => {
    _replayUiTimers = _replayUiTimers.filter(t => t !== timer);
    fn();
  }, delay);
  _replayUiTimers.push(timer);
}

function playSessionEvents(events, src, sessionPath, onComplete) {
  clearReplayTimers();
  let idx = 0;
  document.getElementById('stream-status').textContent =
    `自动播放 · ${src ? src.agent_id : '会话'} · 0/${events.length}`;

  function playNext() {
    if (activeSessionPath !== sessionPath) return;
    if (idx >= events.length) {
      document.getElementById('stream-status').textContent =
        `自动播放完成 · ${src ? src.agent_id : '会话'} · ${eventCount} 个事件`;
      if (onComplete) onComplete();
      return;
    }
    addEvent(events[idx]);
    idx++;
    document.getElementById('stream-status').textContent =
      `自动播放 · ${src ? src.agent_id : '会话'} · ${idx}/${events.length}`;
    _replayTimer = setTimeout(playNext, idx > events.length - 5 ? 520 : 220);
  }

  _replayTimer = setTimeout(playNext, 450);
}

function _renderReplayEvent(ev) {
  const time = ev.ts;
  const isBlocked = ev.blocked || ev.guardrail;
  const status = isBlocked ? 'blocked' : '';
  let msgHtml;

  if (isBlocked && ev.guardrail) {
    msgHtml = `<span class="block-badge">⚠ BLOCKED</span> ${esc(ev.msg)}`;
  } else if (isBlocked) {
    msgHtml = `<span class="k">${esc(ev.msg.split(' → ')[0])}</span> <span class="block-badge">⚠ BLOCKED</span>`;
  } else if (ev.role === 'user') {
    msgHtml = `<span class="k">User</span> ${esc(ev.msg.replace('[User] ', ''))}`;
  } else if (ev.msg.startsWith('Thinking:')) {
    msgHtml = `<span class="arg">${esc(ev.msg)}</span>`;
  } else if (ev.msg.startsWith('Reply:')) {
    msgHtml = `<span class="k">Reply</span> ${esc(ev.msg.substring(7))}`;
  } else if (ev.msg.startsWith('→')) {
    msgHtml = `<span class="arg">${esc(ev.msg)}</span>`;
  } else {
    const parts = ev.msg.split(' ');
    msgHtml = `<span class="k">${esc(parts[0])}</span> <span class="arg">${esc(parts.slice(1).join(' '))}</span>`;
  }

  const fullContent = ev.reason || ev.msg;
  addRow(time, ev.tag, ev.kind, msgHtml, status, isBlocked, fullContent);

  if (ev.tag !== 'SYS') {
    eventCount++;
    if (ev.tag === 'EXEC' || ev.tag === 'FILE' || ev.tag === 'NET') toolCount++;
  }
  updateStats();

  const evalResult = ev._eval
    ? { prediction: ev._eval.prediction, reason: ev._eval.reason, model: ev._eval.model, error: null }
    : null;
  const isEvaluatedAgentReply = ev._chat && ev._chat.role === 'agent' && evalResult;

  if (ev._chat) {
    addGuardChatCard(ev._chat, ev.ts);
  }
  if (evalResult) {
    const showEvaluation = () => {
      addEvaluation(evalResult, {
        skipGuardTimelineCard: isEvaluatedAgentReply && evalResult.prediction === 0,
      });
    };
    if (isEvaluatedAgentReply) scheduleReplayUi(showEvaluation, 700);
    else showEvaluation();
  }

  const wrap = document.getElementById('stream-wrap');
  wrap.scrollTop = wrap.scrollHeight;
}

function loadReplayEvents(sessionPath, src) {
  clearReplayTimers();

  const events = BUNDLED_EVENTS[sessionPath] || [];
  if (!events.length) {
    document.getElementById('stream-status').textContent = '回放 · 无事件';
    return;
  }

  const replaySession = sessionsCache.find(s => s.path === sessionPath);
  const isLive = replaySession && replaySession._is_live_replay;
  const shouldAutoplay = dashboardShouldAutoplay(sessionPath);
  if (shouldAutoplay) dashboardAutoplayConsumed.add(sessionPath);

  document.getElementById('stream-status').textContent =
    isLive ? `实时回放 · ${src ? src.agent_id : '会话'} · 播放中…` : `回放 · ${src ? src.agent_id : '会话'}`;

  if (isLive || shouldAutoplay) {
    let idx = 0;
    function playNext() {
      if (idx >= events.length || activeSessionPath !== sessionPath) return;
      _renderReplayEvent(events[idx]);
      idx++;
      document.getElementById('stream-status').textContent =
        `实时回放 · ${src ? src.agent_id : '会话'} · ${idx}/${events.length}`;
      if (idx < events.length) {
        const delay = (events[idx].blocked || events[idx].guardrail) ? 2200 : (800 + Math.random() * 600);
        _replayTimer = setTimeout(playNext, delay);
      } else {
        document.getElementById('stream-status').textContent =
          `实时回放 · ${src ? src.agent_id : '会话'} · 播放完成 · ${eventCount} 个事件`;
        if (!isLive && replaySession && replaySession.verdict_prediction != null) {
          addEvaluation({
            prediction: replaySession.verdict_prediction,
            reason: replaySession.verdict_reason || '',
            model: replaySession.verdict_model || '',
            error: null,
          });
        }
      }
    }
    _replayTimer = setTimeout(playNext, 600);
    return;
  }

  for (const ev of events) { _renderReplayEvent(ev); }

  if (replaySession && replaySession.verdict_prediction != null) {
    addEvaluation({
      prediction: replaySession.verdict_prediction,
      reason: replaySession.verdict_reason || '',
      model: replaySession.verdict_model || '',
      error: null,
    });
  }

  document.getElementById('stream-status').textContent =
    `回放 · ${src ? src.agent_id : '会话'} · ${eventCount} 个事件`;
  const wrap = document.getElementById('stream-wrap');
  wrap.scrollTop = wrap.scrollHeight;
}

/* ═══════════════════════════════════════════════════════
   Gantt timeline
   ═══════════════════════════════════════════════════════ */
const GANTT_WINDOW = 30; // minutes

function renderGantt() {
  const sessions = sessionsCache;
  if (!sessions.length) return;

  const now = Date.now() / 1000;
  const windowSec = GANTT_WINDOW * 60;

  const ganttSessions = sessions.map(s => {
    const startAgo = (now - s.mtime) / 60;
    const evCount = s.event_count || 0;
    const duration = Math.max(evCount * 0.08, 1);
    const totalStartAgo = startAgo + duration;

    let state = 'idle';
    if (s.verdict === 'unsafe') state = 'blocked';
    else if (s.verdict === 'safe') state = 'safe';
    else if (startAgo < 10) state = 'safe';

    const hits = [];
    const history = s.eval_history || [];
    for (const h of history) {
      if (h.prediction === 1 && h.ts) {
        const hitAgo = (now - h.ts) / 60;
        if (hitAgo >= 0 && hitAgo <= GANTT_WINDOW) hits.push(hitAgo);
      }
    }
    if (hits.length > 0) state = 'blocked';

    return {
      id: s.name ? s.name.substring(0, 8) : '?',
      path: s.path,
      agent: s.agent_id || '',
      state,
      start: Math.min(totalStartAgo, GANTT_WINDOW),
      len: Math.min(duration, GANTT_WINDOW),
      hits,
    };
  }).filter(s => s.start <= GANTT_WINDOW + 5);

  const concurrent = ganttSessions.filter(s => s.start - s.len <= 0.5).length;
  document.getElementById('gantt-meta').textContent =
    `最近 ${GANTT_WINDOW} 分钟 · ${concurrent} 并发`;

  // Axis
  const axis = document.getElementById('gantt-axis');
  const ticks = [30, 25, 20, 15, 10, 5, 0];
  axis.innerHTML = ticks.map(m => {
    const pct = ((GANTT_WINDOW - m) / GANTT_WINDOW * 100).toFixed(1);
    const label = m === 0 ? 'now' : m + 'm';
    const cls = m === 0 ? 'tick tick-now' : 'tick';
    return `<span class="${cls}" style="left:${pct}%">${label}</span>`;
  }).join('');

  // Rows
  const rows = document.getElementById('gantt-rows');
  const frag = document.createDocumentFragment();
  for (const s of ganttSessions) {
    const row = document.createElement('div');
    row.className = 'gantt-row' + (s.path === activeSessionPath ? ' is-active' : '');
    row.addEventListener('click', () => selectSession(s.path));

    const dotColor = s.state === 'safe' ? 'var(--accent)' : s.state === 'blocked' ? '#dc2626' : 'var(--mute-2)';
    const barLeft = ((GANTT_WINDOW - s.start) / GANTT_WINDOW * 100).toFixed(2);
    const barWidth = (s.len / GANTT_WINDOW * 100).toFixed(2);

    let hitsHtml = '';
    for (const hitAgo of s.hits) {
      const hitLocal = ((s.start - hitAgo) / s.len * 100).toFixed(1);
      if (hitLocal >= 0 && hitLocal <= 100) {
        hitsHtml += `<span class="gantt-hit" style="left:${hitLocal}%"></span>`;
      }
    }

    row.innerHTML = `
      <div class="gantt-label">
        <span class="gdot" style="background:${dotColor}"></span>
        ${esc(s.id)}
      </div>
      <div class="gantt-track">
        <div class="gantt-bar gs-${s.state}" style="left:${barLeft}%;width:${barWidth}%">
          ${hitsHtml}
        </div>
        <span class="now-line"></span>
      </div>
    `;
    frag.appendChild(row);
  }
  rows.innerHTML = '';
  rows.appendChild(frag);
}

/* ═══════════════════════════════════════════════════════
   Approvals queue
   ═══════════════════════════════════════════════════════ */
const PENDING_APPROVALS = [];

let approvalTimers = {};

function renderApprovals() {
  const list = document.getElementById('approvals-list');
  const countEl = document.getElementById('approvals-count');
  list.innerHTML = '';
  countEl.textContent = PENDING_APPROVALS.length;

  for (const ap of PENDING_APPROVALS) {
    const card = document.createElement('div');
    card.className = `approval-card ap-${ap.level}`;
    card.dataset.id = ap.id;
    const icon = ap.level === 'urgent' ? '!' : 'i';
    const mins = Math.floor(ap.expiresInSec / 60);
    const secs = ap.expiresInSec % 60;
    const timerStr = ap.expiresInSec <= 0 ? '已过期' : `${mins}:${String(secs).padStart(2,'0')}`;
    card.innerHTML = `
      <div class="ap-ic">${icon}</div>
      <div>
        <div class="ap-title">${ap.title}</div>
        <div class="ap-meta">${esc(ap.sessionId)} · ${esc(ap.agent)} <span class="ap-timer">${timerStr}</span></div>
        <div class="ap-actions">
          <button class="ap-btn ap-btn-allow" data-id="${ap.id}">批准</button>
          <button class="ap-btn ap-btn-deny" data-id="${ap.id}">拒绝</button>
        </div>
      </div>
    `;
    list.appendChild(card);
  }

  list.addEventListener('click', (e) => {
    const btn = e.target.closest('.ap-btn');
    if (!btn) return;
    const id = btn.dataset.id;
    const idx = PENDING_APPROVALS.findIndex(a => a.id === id);
    if (idx !== -1) {
      PENDING_APPROVALS.splice(idx, 1);
      renderApprovals();
    }
  });
}

setInterval(() => {
  let changed = false;
  for (const ap of PENDING_APPROVALS) {
    if (ap.expiresInSec > 0) { ap.expiresInSec--; changed = true; }
  }
  if (changed) {
    document.querySelectorAll('.approval-card').forEach(card => {
      const id = card.dataset.id;
      const ap = PENDING_APPROVALS.find(a => a.id === id);
      if (!ap) return;
      const timer = card.querySelector('.ap-timer');
      if (!timer) return;
      if (ap.expiresInSec <= 0) { timer.textContent = '已过期'; timer.style.color = '#dc2626'; }
      else {
        const m = Math.floor(ap.expiresInSec / 60);
        const s = ap.expiresInSec % 60;
        timer.textContent = `${m}:${String(s).padStart(2,'0')}`;
      }
    });
  }
}, 1000);

renderApprovals();

/* ═══════════════════════════════════════════════════════
   Activity heatmap (real data from sessions)
   ═══════════════════════════════════════════════════════ */
function renderHeatmap() {
  const grid = document.getElementById('heatmap-grid');
  const axis = document.getElementById('heatmap-axis');

  // Build 7-day × 24-hour buckets from real session data
  const now = new Date();
  const buckets = {}; // "dayIdx_hour" -> { events: N, blocks: N }
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dayLabels = ['M','T','W','T','F','S','S']; // Mon-Sun display

  // Init 7 days of buckets
  for (let d = 0; d < 7; d++) {
    for (let h = 0; h < 24; h++) {
      buckets[`${d}_${h}`] = { events: 0, blocks: 0 };
    }
  }

  // Map a timestamp to day/hour bucket
  function tsToBucket(epochSec) {
    const date = new Date(epochSec * 1000);
    const diffDays = Math.floor((now - date) / (86400 * 1000));
    if (diffDays < 0 || diffDays >= 7) return null;
    const dayIdx = 6 - diffDays; // 0=oldest, 6=today
    return { dayIdx, hour: date.getHours() };
  }

  // Accumulate real + bundled sessions
  for (const s of sessionsCache) {
    const b = tsToBucket(s.mtime);
    if (b) {
      buckets[`${b.dayIdx}_${b.hour}`].events += (s.event_count || 1);
    }
    // Block events from eval_history
    for (const h of (s.eval_history || [])) {
      if (h.ts) {
        const hb = tsToBucket(h.ts);
        if (hb) {
          buckets[`${hb.dayIdx}_${hb.hour}`].events += 1;
          if (h.prediction === 1) buckets[`${hb.dayIdx}_${hb.hour}`].blocks += 1;
        }
      }
    }
  }

  // Find max for normalization
  let maxEvents = 1;
  for (const key in buckets) {
    if (buckets[key].events > maxEvents) maxEvents = buckets[key].events;
  }

  // Build day labels (Mon-Sun for the actual 7 days)
  const dayOrder = [];
  for (let d = 0; d < 7; d++) {
    const date = new Date(now.getTime() - (6 - d) * 86400 * 1000);
    const dayOfWeek = date.getDay(); // 0=Sun
    const label = dayLabels[(dayOfWeek + 6) % 7]; // convert to Mon=0
    const name = dayNames[dayOfWeek];
    dayOrder.push({ d, label, name });
  }

  let html = '';
  for (const { d, label, name } of dayOrder) {
    html += `<span class="hm-day">${label}</span>`;
    for (let h = 0; h < 24; h++) {
      const cell = buckets[`${d}_${h}`];
      const v = Math.min(100, Math.round((cell.events / maxEvents) * 100));
      const hasBlock = cell.blocks > 0;
      const dot = hasBlock ? '<span class="hm-dot"></span>' : '';
      const blockStr = hasBlock ? ` · ${cell.blocks} block` : '';
      const tip = `${name} ${String(h).padStart(2,'0')}:00 · ${cell.events} events${blockStr}`;
      html += `<span class="hm-cell" style="--v:${v}" title="${tip}">${dot}</span>`;
    }
  }
  grid.innerHTML = html;

  let axisHtml = '<span></span>';
  for (let h = 0; h < 24; h++) {
    if (h === 0 || h === 6 || h === 12 || h === 18 || h === 23) {
      axisHtml += `<span>${String(h === 23 ? 24 : h).padStart(2,'0')}</span>`;
    } else {
      axisHtml += '<span></span>';
    }
  }
  axis.innerHTML = axisHtml;
}

renderHeatmap();

/* ═══════════════════════════════════════════════════════
   UI Scale — auto-adapt to viewport, manual +/- override
   ═══════════════════════════════════════════════════════ */
const SCALE_REF = 2560;
const SCALE_MIN = 0.6;
const SCALE_MAX = 1.6;
const SCALE_STEP = 0.05;
let manualScaleOffset = parseFloat(localStorage.getItem('agentdog-scale-offset') || '0');

function computeScale() {
  const auto = window.innerWidth / SCALE_REF;
  const raw = auto + manualScaleOffset;
  return Math.min(SCALE_MAX, Math.max(SCALE_MIN, raw));
}
function applyScale() {
  const s = computeScale();
  document.documentElement.style.setProperty('--ui-scale', s.toFixed(3));
  document.getElementById('zoom-label').textContent = Math.round(s * 100) + '%';
}
document.getElementById('zoom-in').addEventListener('click', () => {
  manualScaleOffset += SCALE_STEP;
  localStorage.setItem('agentdog-scale-offset', manualScaleOffset.toFixed(3));
  applyScale();
});
document.getElementById('zoom-out').addEventListener('click', () => {
  manualScaleOffset -= SCALE_STEP;
  localStorage.setItem('agentdog-scale-offset', manualScaleOffset.toFixed(3));
  applyScale();
});
document.getElementById('zoom-label').addEventListener('dblclick', () => {
  manualScaleOffset = 0;
  localStorage.setItem('agentdog-scale-offset', '0');
  applyScale();
});
window.addEventListener('resize', applyScale);
applyScale();

/* ═══════════════════════════════════════════════════════
   Utilities
   ═══════════════════════════════════════════════════════ */
function extractText(content) {
  if (typeof content === 'string') return content;
  if (!Array.isArray(content)) return '';
  return content.filter(c => c.type === 'text' && c.text).map(c => c.text).join('\n');
}
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
